name: catatrapat
description: Aplikasi pencatatan rapat otomatis berbasis AI — Bahasa Indonesia.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Fonts
  google_fonts: ^6.2.1

  # Navigation
  go_router: ^13.2.0

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  dio: ^5.4.3+1
  retrofit: ^4.1.0

  # Supabase (Auth + DB + Storage)
  supabase_flutter: ^2.5.0

  # Local storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Audio recording
  record: ^5.1.0

  # Audio playback
  just_audio: ^0.9.38

  # Audio waveform visualization
  audio_waveforms: ^1.0.5

  # File picker
  file_picker: ^8.0.3

  # Realtime transcription (WebSocket)
  web_socket_channel: ^3.0.3

  # PDF generation
  pdf: ^3.10.8
  printing: ^5.12.0

  # Share
  share_plus: ^9.0.0

  # Utils
  intl: ^0.19.0
  equatable: ^2.0.5
  uuid: ^4.3.3
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  url_launcher: ^6.2.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9
  json_serializable: ^6.7.1
  retrofit_generator: ^8.1.0

flutter:
  uses-material-design: true

  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/PlusJakartaSans-ExtraBold.ttf
          weight: 800

  assets:
    - assets/images/
    - assets/fonts/
